name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify shared scanner vendored copies are in sync
        run: scripts/verify-shared-sync.sh

      - name: Run shared scanner smoke tests
        run: scripts/test-security-scan.mjs

      - name: Run permission-policy classification unit tests
        run: npx --yes tsx permission-policy/test-fixtures/test-classification.ts
