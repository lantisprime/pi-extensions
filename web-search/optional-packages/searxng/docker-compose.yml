# Optional local SearXNG provider for Pi secure_web_search.
# Based on the official SearXNG container installation docs:
# https://docs.searxng.org/admin/installation-docker.html#installation-container

name: pi-web-search-searxng

services:
  core:
    container_name: pi-web-search-searxng-core
    image: ${SEARXNG_IMAGE:-docker.io/searxng/searxng}:${SEARXNG_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${PI_SEARXNG_HOST:-127.0.0.1}:${PI_SEARXNG_PORT:-8080}:8080"
    env_file: ./.env
    environment:
      SEARXNG_BIND_ADDRESS: "0.0.0.0"
      SEARXNG_PORT: "8080"
    volumes:
      - ./core-config/:/etc/searxng/
      - core-data:/var/cache/searxng/
    depends_on:
      - valkey

  valkey:
    container_name: pi-web-search-searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data/

volumes:
  core-data:
  valkey-data:
